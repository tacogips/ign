version: '3'

vars:
  BINARY_NAME: ign
  CMD_PATH: ./cmd/ign

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the binary
    cmds:
      - go build -o {{.BINARY_NAME}} {{.CMD_PATH}}

  run:
    desc: Run the application
    deps: [build]
    cmds:
      - ./{{.BINARY_NAME}}

  test:
    desc: Run tests
    cmds:
      - go test -v ./...

  test-coverage:
    desc: Run tests with coverage
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}}
      - rm -f coverage.out coverage.html

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  build:homebrew:
    desc: Build a standalone Homebrew release archive for the current platform, or pass targets after --
    cmds:
      - scripts/build-homebrew-release.sh {{.CLI_ARGS}}

  homebrew:formula:
    desc: Render Formula/ign.rb from dist/homebrew checksums (pass the version after --)
    cmds:
      - scripts/render-homebrew-formula.sh {{.CLI_ARGS}}

  homebrew:tap-formula:
    desc: Render ign into the sibling tacogips/homebrew-tap repository (pass version after --)
    cmds:
      - |
        set -euo pipefail
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "usage: task homebrew:tap-formula -- <version>" >&2
          exit 2
        fi
        scripts/render-homebrew-formula.sh "{{.CLI_ARGS}}" ../homebrew-tap/Formula/ign.rb
